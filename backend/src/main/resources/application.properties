spring.application.name=carteira-estudantil
server.port=8080

# Database - H2 for standalone, PostgreSQL for production
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/carteira;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USER:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.database-platform=${DATABASE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
upload.dir=${UPLOAD_DIR:./uploads}

# JWT
jwt.secret=${JWT_SECRET:carteiraEstudantilSecretKey2024MuitoSeguraParaProducao123456789}
jwt.expiration=86400000

# App URL for QR Code
app.base-url=${APP_BASE_URL:http://localhost:8000}